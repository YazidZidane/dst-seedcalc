<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Graphs</title>
</head>
<body>
  <h1>Graphs from Previous Run</h1>
  
  <div>
    <label for="graph-select">Select a graph:</label>
    <select id="graph-select"></select>
  </div>

  <div>
    <p id="fetch-status"></p>
  </div>
  
  <div id="image-container">
    <img id="current-graph" src="" alt="Graph from previous run">
  </div>
  
  <div>
    <button id="prev-btn">Previous</button>
    <button id="next-btn">Next</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
