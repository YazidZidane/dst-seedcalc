name: Run Python Script

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  run-script:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: generated-graphs
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Miniconda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12.2'
          activate-environment: my_env
      
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Run the Python script
        run: |
          python test_script.py
          python generate_plot.py
      
      - name: Upload generated graphs
        uses: actions/upload-artifact@v4
        with:
          name: generated-graphs
          path: graphs/

  deploy-to-pages:
    needs: run-script
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-graphs
          path: generated-graphs
      
      - name: Create index.html for graphs
        run: |
          echo '<html>
            <head>
              <title>Generated Graphs</title>
              <style>
                body { font-family: sans-serif; margin: 2em; }
                img { max-width: 100%; height: auto; display: block; margin-bottom: 2em; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
              </style>
            </head>
            <body>
              <h1>Graphs from Last Run</h1>
              <ul>' > index.html
          
          if [ -d "generated-graphs" ]; then
            if [ -z "$(ls -A generated-graphs)" ]; then
              echo "<li>No graphs found in the artifact.</li>" >> index.html
            else
              for file in generated-graphs/*.png; do
                echo "<li><img src='generated-graphs/$(basename "$file")' alt='$(basename "$file")'></li>" >> index.html
              done
            fi
          else
            echo "<li>The 'generated-graphs' directory was not found.</li>" >> index.html
          fi
          echo '</ul></body></html>' >> index.html

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: false

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
