name: Run Python Script

on:
  pull_request:
    branches:
      - main
      - develop
  
  # Add the 'workflow_dispatch' event to manually trigger the workflow
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Miniconda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12.2'
          activate-environment: my_env
      
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Run the Python script and create website files
        run: |
          # Create a directory to hold the deployable website files and graphs
          mkdir -p dist/graphs

          # Run the Python scripts to generate graphs
          python test_script.py
          python generate_plot.py

          # Move the generated graphs to the 'dist/graphs' directory
          mv graphs/* dist/graphs/

          # Create a JSON file with a list of the generated graph filenames
          # The website's script.js will fetch this file
          ls dist/graphs/*.png | xargs -n 1 basename | jq -R . | jq -s . > dist/graphs/graphs.json
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./dist
