name: Call API on PR Approval

on:
  pull_request:
    types: [closed]

jobs:
  call-api:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'automated')
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step to extract the raw JSON from the pull request body's code block
      - name: Extract JSON from PR body
        id: extract_json
        run: |
          # Use printf to handle multiline strings robustly and pipe to sed.
          # The sed command extracts text between the markdown code fences.
          EXTRACTED_JSON=$(printf "%s" "${{ github.event.pull_request.body }}" | sed -n '/```json/,/```/p' | sed '1d;$d')
          
          # Check if the extracted file is valid JSON and set it as an output.
          # The -e flag is to not output the extracted JSON
          if jq -e . pr_data.json > /dev/null; then
              echo "raw_json=$(<pr_data.json)" >> "$GITHUB_OUTPUT"
          else
              echo "raw_json={}" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Make API call
        run: |
          # Construct the full JSON payload using jq for safety and robustness
          PAYLOAD=$(jq --null-input \
            --arg pr_id "${{ github.event.pull_request.number }}" \
            --arg pr_branch "${{ github.event.pull_request.head.ref }}" \
            --argjson pr_data "${{ steps.extract_json.outputs.raw_json }}" \
            '{pr_id: $pr_id, pr_branch: $pr_branch, pr_data: $pr_data}')
          
          # Use curl to make a POST request with the required parameters
          curl -X POST http://localhost:3000/api/test \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"