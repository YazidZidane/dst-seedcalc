name: Call API on PR Approval

on:
  pull_request:
    types: [closed]

jobs:
  call-api:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'automated')
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      
      - name: Make API call
        run: |
          # The printf command handles multiline strings and special characters correctly
          PAYLOAD=$(printf '{
            "pr_id": "%s",
            "pr_branch": "%s",
            "pr_comment": "%s"
          }' \
          "${{ github.event.pull_request.number }}" \
          "${{ github.event.pull_request.head.ref }}" \
          "${{ github.event.pull_request.body }}")
          
          # Use curl to make a POST request with the constructed payload
          curl -X POST http://localhost:3000/api/test \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"